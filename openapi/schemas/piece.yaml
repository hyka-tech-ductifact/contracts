# ─── Piece Schemas ───────────────────────────────────────────
PieceShape:
  type: string
  description: Geometric shape of the piece
  enum:
    - rectangular
    - circular
    - triangular
  example: "rectangular"

CreatePieceRequest:
  type: object
  description: Request body for creating a new piece
  required:
    - shape
  properties:
    image_url:
      $ref: "_fields.yaml#/ImageUrl"
      description: URL of the piece image (will point to MinIO in the future)
      default: ""
    shape:
      $ref: "#/PieceShape"

UpdatePieceRequest:
  type: object
  description: Request body for updating a piece. All fields are optional.
  properties:
    image_url:
      $ref: "_fields.yaml#/ImageUrl"
      description: URL of the piece image
      example: "https://minio.example.com/pieces/abc123.png"
    shape:
      $ref: "#/PieceShape"

PieceResponse:
  type: object
  description: Piece data returned by the API
  required:
    - id
    - image_url
    - shape
    - order_id
  properties:
    id:
      $ref: "_fields.yaml#/UUID"
      description: Unique piece identifier
    image_url:
      $ref: "_fields.yaml#/ImageUrl"
      description: URL of the piece image (empty until MinIO integration)
    shape:
      $ref: "#/PieceShape"
    order_id:
      $ref: "_fields.yaml#/UUID"
      description: ID of the order this piece belongs to

PaginatedPieceResponse:
  type: object
  description: Paginated list of pieces with navigation metadata
  required:
    - data
    - page
    - page_size
    - total_items
    - total_pages
  properties:
    data:
      type: array
      items:
        $ref: "#/PieceResponse"
    page:
      $ref: "_fields.yaml#/Page"
    page_size:
      $ref: "_fields.yaml#/PageSize"
    total_items:
      $ref: "_fields.yaml#/TotalItems"
      example: 8
    total_pages:
      $ref: "_fields.yaml#/TotalPages"
      example: 1
