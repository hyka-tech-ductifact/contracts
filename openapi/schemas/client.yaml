# ─── Client Schemas ──────────────────────────────────────────
CreateClientRequest:
  type: object
  description: Request body for creating a new client
  required:
    - name
  properties:
    name:
      $ref: "_fields.yaml#/ClientName"
    phone:
      $ref: "_fields.yaml#/Phone"
      description: The client's phone number
    email:
      $ref: "_fields.yaml#/ContactEmail"
      description: The client's contact email
    description:
      $ref: "_fields.yaml#/Description"
      description: Additional notes about the client
      example: "Main construction partner"

UpdateClientRequest:
  type: object
  description: Request body for updating a client. All fields are optional.
  properties:
    name:
      $ref: "_fields.yaml#/ClientName"
    phone:
      $ref: "_fields.yaml#/Phone"
      description: The client's phone number
    email:
      $ref: "_fields.yaml#/ContactEmail"
      description: The client's contact email
    description:
      $ref: "_fields.yaml#/Description"
      description: Additional notes about the client
      example: "Main construction partner"

ClientResponse:
  type: object
  description: Client data returned by the API
  required:
    - id
    - name
    - user_id
  properties:
    id:
      $ref: "_fields.yaml#/UUID"
      description: Unique client identifier
    name:
      $ref: "_fields.yaml#/ClientName"
    phone:
      $ref: "_fields.yaml#/Phone"
      description: The client's phone number
    email:
      $ref: "_fields.yaml#/ContactEmail"
      description: The client's contact email
    description:
      $ref: "_fields.yaml#/Description"
      description: Additional notes about the client
      example: "Main construction partner"
    user_id:
      $ref: "_fields.yaml#/UUID"
      description: ID of the user who owns this client

PaginatedClientResponse:
  type: object
  description: Paginated list of clients with navigation metadata
  required:
    - data
    - page
    - page_size
    - total_items
    - total_pages
  properties:
    data:
      type: array
      items:
        $ref: "#/ClientResponse"
    page:
      $ref: "_fields.yaml#/Page"
    page_size:
      $ref: "_fields.yaml#/PageSize"
    total_items:
      $ref: "_fields.yaml#/TotalItems"
    total_pages:
      $ref: "_fields.yaml#/TotalPages"
