# ─── Health Schemas ──────────────────────────────────────────
HealthResponse:
  type: object
  description: Health check response when service is healthy
  required:
    - status
    - uptime
    - database
    - contract_version
  properties:
    status:
      type: string
      enum: ["healthy"]
      example: "healthy"
    uptime:
      type: string
      description: Time since the server started
      example: "2h35m10s"
    database:
      type: string
      enum: ["connected"]
      example: "connected"
    contract_version:
      type: string
      description: Semantic version of the API contract (matches openapi.yaml info.version)
      pattern: '^\d+\.\d+\.\d+$'
      example: "1.0.0"

HealthResponseUnhealthy:
  type: object
  description: Health check response when service is unhealthy
  required:
    - status
    - uptime
    - database
    - error
    - contract_version
  properties:
    status:
      type: string
      enum: ["unhealthy"]
      example: "unhealthy"
    uptime:
      type: string
      description: Time since the server started
      example: "2h35m10s"
    database:
      type: string
      enum: ["disconnected"]
      example: "disconnected"
    error:
      type: string
      description: Error message describing the failure
      example: "connection refused"
    contract_version:
      type: string
      description: Semantic version of the API contract (matches openapi.yaml info.version)
      pattern: '^\d+\.\d+\.\d+$'
      example: "1.0.0"
