# ─── Auth Schemas ────────────────────────────────────────────
RegisterRequest:
  type: object
  description: Request body for registering a new user
  additionalProperties: false
  required:
    - name
    - email
    - password
  properties:
    name:
      type: string
      minLength: 1
      description: The user's full name
      example: "Juan García"
    email:
      type: string
      format: email
      description: The user's email address (must be unique)
      example: "juan@example.com"
    password:
      type: string
      minLength: 8
      description: Password (minimum 8 characters)
      example: "securepass123"

LoginRequest:
  type: object
  description: Request body for logging in
  additionalProperties: false
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
      description: The user's email address
      example: "juan@example.com"
    password:
      type: string
      minLength: 1
      description: The user's password
      example: "securepass123"

AuthResponse:
  type: object
  description: Response returned after successful register or login
  required:
    - user
    - access_token
    - refresh_token
  properties:
    user:
      $ref: "user.yaml#/UserResponse"
    access_token:
      type: string
      description: Short-lived JWT for authenticating API requests
      example: "eyJhbGciOiJIUzI1NiIs..."
    refresh_token:
      type: string
      description: Long-lived JWT for obtaining new access tokens
      example: "eyJhbGciOiJIUzI1NiIs..."

RefreshRequest:
  type: object
  description: Request body for refreshing an access token
  additionalProperties: false
  required:
    - refresh_token
  properties:
    refresh_token:
      type: string
      minLength: 1
      description: The refresh token obtained from register or login
      example: "eyJhbGciOiJIUzI1NiIs..."

TokenResponse:
  type: object
  description: Response containing a new token pair
  required:
    - access_token
    - refresh_token
  properties:
    access_token:
      type: string
      description: Short-lived JWT for authenticating API requests
      example: "eyJhbGciOiJIUzI1NiIs..."
    refresh_token:
      type: string
      description: Long-lived JWT for obtaining new access tokens
      example: "eyJhbGciOiJIUzI1NiIs..."

LogoutRequest:
  type: object
  description: Request body for logging out (revoking tokens)
  additionalProperties: false
  required:
    - refresh_token
  properties:
    refresh_token:
      type: string
      minLength: 1
      description: The refresh token to revoke
      example: "eyJhbGciOiJIUzI1NiIs..."

MessageResponse:
  type: object
  description: Generic success message
  required:
    - message
  properties:
    message:
      type: string
      description: Human-readable success message
      example: "logged out successfully"
