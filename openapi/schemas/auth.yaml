# ─── Auth Schemas ────────────────────────────────────────────
RegisterRequest:
  type: object
  description: Request body for registering a new user
  additionalProperties: false
  required:
    - name
    - email
    - password
  properties:
    name:
      $ref: "_fields.yaml#/UserName"
    email:
      $ref: "_fields.yaml#/UserEmail"
      description: The user's email address (must be unique)
    password:
      $ref: "_fields.yaml#/Password"
      description: Password (minimum 8 characters)
      minLength: 8

LoginRequest:
  type: object
  description: Request body for logging in
  additionalProperties: false
  required:
    - email
    - password
  properties:
    email:
      $ref: "_fields.yaml#/UserEmail"
    password:
      $ref: "_fields.yaml#/Password"
      description: The user's password
      minLength: 1

AuthResponse:
  type: object
  description: Response returned after successful register or login
  required:
    - user
    - access_token
    - refresh_token
  properties:
    user:
      $ref: "user.yaml#/UserResponse"
    access_token:
      $ref: "_fields.yaml#/AccessToken"
    refresh_token:
      $ref: "_fields.yaml#/RefreshToken"

RefreshRequest:
  type: object
  description: Request body for refreshing an access token
  additionalProperties: false
  required:
    - refresh_token
  properties:
    refresh_token:
      $ref: "_fields.yaml#/RefreshToken"
      description: The refresh token obtained from register or login
      minLength: 1

TokenResponse:
  type: object
  description: Response containing a new token pair
  required:
    - access_token
    - refresh_token
  properties:
    access_token:
      $ref: "_fields.yaml#/AccessToken"
    refresh_token:
      $ref: "_fields.yaml#/RefreshToken"

LogoutRequest:
  type: object
  description: Request body for logging out (revoking tokens)
  additionalProperties: false
  required:
    - refresh_token
  properties:
    refresh_token:
      $ref: "_fields.yaml#/RefreshToken"
      description: The refresh token to revoke
      minLength: 1

MessageResponse:
  type: object
  description: Generic success message
  required:
    - message
  properties:
    message:
      type: string
      description: Human-readable success message
      example: "logged out successfully"
