# ─── User Schemas ────────────────────────────────────────────
UpdateUserRequest:
  type: object
  description: Request body for updating a user. All fields are optional.
  properties:
    name:
      $ref: "_fields.yaml#/UserName"
      description: The user's new name
    email:
      $ref: "_fields.yaml#/UserEmail"
      description: The user's new email (must be unique)

UserResponse:
  type: object
  description: User data returned by the API
  required:
    - id
    - name
    - email
  properties:
    id:
      $ref: "_fields.yaml#/UUID"
      description: Unique user identifier
    name:
      $ref: "_fields.yaml#/UserName"
    email:
      $ref: "_fields.yaml#/UserEmail"
