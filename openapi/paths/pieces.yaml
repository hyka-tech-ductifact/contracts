# ─── Piece Endpoints ──────────────────────────────────────────

# POST + GET /users/me/clients/{client_id}/projects/{project_id}/orders/{order_id}/pieces
collection:
  post:
    summary: Create a new piece for an order
    operationId: createPiece
    tags:
      - Pieces
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
      - name: order_id
        in: path
        required: true
        description: The order's UUID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/piece.yaml#/CreatePieceRequest"
          example:
            title: "Side panel"
            definition_id: "a0000000-0000-0000-0000-000000000001"
            dimensions:
              Length: 150.5
              Width: 80.0
            quantity: 15
    responses:
      "201":
        description: Piece created successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/piece.yaml#/PieceResponse"
      "400":
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Parent resource not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  get:
    summary: List all pieces for an order
    operationId: listPieces
    tags:
      - Pieces
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
      - name: order_id
        in: path
        required: true
        description: The order's UUID
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        description: Page number (1-based). Defaults to 1.
        schema:
          type: integer
          minimum: 1
          default: 1
          example: 1
      - name: page_size
        in: query
        required: false
        description: Number of items per page. Defaults to 20, max 100.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          example: 20
    responses:
      "200":
        description: Paginated list of pieces
        content:
          application/json:
            schema:
              $ref: "../schemas/piece.yaml#/PaginatedPieceResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Parent resource not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

# GET/PUT/DELETE /users/me/clients/{client_id}/projects/{project_id}/orders/{order_id}/pieces/{piece_id}
item:
  get:
    summary: Get a piece by ID
    operationId: getPiece
    tags:
      - Pieces
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
      - name: order_id
        in: path
        required: true
        description: The order's UUID
        schema:
          type: string
          format: uuid
      - name: piece_id
        in: path
        required: true
        description: The piece's UUID
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Piece found
        content:
          application/json:
            schema:
              $ref: "../schemas/piece.yaml#/PieceResponse"
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Resource not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  put:
    summary: Update a piece
    operationId: updatePiece
    tags:
      - Pieces
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
      - name: order_id
        in: path
        required: true
        description: The order's UUID
        schema:
          type: string
          format: uuid
      - name: piece_id
        in: path
        required: true
        description: The piece's UUID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/piece.yaml#/UpdatePieceRequest"
          example:
            title: "Side panel (revised)"
            dimensions:
              Length: 200.0
              Width: 100.0
            quantity: 20
    responses:
      "200":
        description: Piece updated successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/piece.yaml#/PieceResponse"
      "400":
        description: Invalid request body or ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Resource not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  delete:
    summary: Delete a piece
    operationId: deletePiece
    tags:
      - Pieces
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
      - name: order_id
        in: path
        required: true
        description: The order's UUID
        schema:
          type: string
          format: uuid
      - name: piece_id
        in: path
        required: true
        description: The piece's UUID
        schema:
          type: string
          format: uuid
    responses:
      "204":
        description: Piece deleted successfully
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Resource not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
