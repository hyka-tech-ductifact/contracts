# ─── Order Endpoints ──────────────────────────────────────────

# POST + GET /users/me/clients/{client_id}/projects/{project_id}/orders
collection:
  post:
    summary: Create a new order for a project
    operationId: createOrder
    tags:
      - Orders
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/order.yaml#/CreateOrderRequest"
          example:
            title: "Steel beams – lot 3"
    responses:
      "201":
        description: Order created successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/order.yaml#/OrderResponse"
      "400":
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Client or project not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  get:
    summary: List all orders for a project
    operationId: listOrders
    tags:
      - Orders
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        description: Page number (1-based). Defaults to 1.
        schema:
          type: integer
          minimum: 1
          default: 1
          example: 1
      - name: page_size
        in: query
        required: false
        description: Number of items per page. Defaults to 20, max 100.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          example: 20
    responses:
      "200":
        description: Paginated list of orders
        content:
          application/json:
            schema:
              $ref: "../schemas/order.yaml#/PaginatedOrderResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Client or project not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

# GET/PUT/DELETE /users/me/clients/{client_id}/projects/{project_id}/orders/{order_id}
item:
  get:
    summary: Get an order by ID
    operationId: getOrder
    tags:
      - Orders
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
      - name: order_id
        in: path
        required: true
        description: The order's UUID
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Order found
        content:
          application/json:
            schema:
              $ref: "../schemas/order.yaml#/OrderResponse"
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Resource not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  put:
    summary: Update an order
    operationId: updateOrder
    tags:
      - Orders
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
      - name: order_id
        in: path
        required: true
        description: The order's UUID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/order.yaml#/UpdateOrderRequest"
          example:
            status: "completed"
    responses:
      "200":
        description: Order updated successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/order.yaml#/OrderResponse"
      "400":
        description: Invalid request body or ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Resource not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  delete:
    summary: Delete an order
    operationId: deleteOrder
    tags:
      - Orders
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        description: The project's UUID
        schema:
          type: string
          format: uuid
      - name: order_id
        in: path
        required: true
        description: The order's UUID
        schema:
          type: string
          format: uuid
    responses:
      "204":
        description: Order deleted successfully
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Resource not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
