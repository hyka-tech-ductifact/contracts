# ─── Client Endpoints ────────────────────────────────────────

# POST /clients + GET /clients
collection:
  post:
    summary: Create a new client
    operationId: createClient
    tags:
      - Clients
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/client.yaml#/CreateClientRequest"
          example:
            name: "Acme Corp"
    responses:
      "201":
        description: Client created successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/client.yaml#/ClientResponse"
      "400":
        description: Invalid request body (missing or empty name)
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  get:
    summary: List all clients for the authenticated user
    operationId: listClients
    tags:
      - Clients
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        required: false
        description: Page number (1-based). Defaults to 1.
        schema:
          type: integer
          minimum: 1
          default: 1
          example: 1
      - name: page_size
        in: query
        required: false
        description: Number of items per page. Defaults to 20, max 100.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          example: 20
    responses:
      "200":
        description: Paginated list of clients
        content:
          application/json:
            schema:
              $ref: "../schemas/client.yaml#/PaginatedClientResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

# GET/PUT/DELETE /clients/{client_id}
item:
  get:
    summary: Get a client by ID
    operationId: getClient
    tags:
      - Clients
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Client found
        content:
          application/json:
            schema:
              $ref: "../schemas/client.yaml#/ClientResponse"
      "400":
        description: Invalid client ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "invalid client ID format"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "403":
        description: Client does not belong to this user
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "client does not belong to this user"
      "404":
        description: Client not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "client not found"

  put:
    summary: Update a client
    operationId: updateClient
    tags:
      - Clients
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/client.yaml#/UpdateClientRequest"
          example:
            name: "Acme Corp Updated"
    responses:
      "200":
        description: Client updated successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/client.yaml#/ClientResponse"
      "400":
        description: Invalid request body or client ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "403":
        description: Client does not belong to this user
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Client not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  delete:
    summary: Delete a client
    operationId: deleteClient
    tags:
      - Clients
    security:
      - bearerAuth: []
    parameters:
      - name: client_id
        in: path
        required: true
        description: The client's UUID
        schema:
          type: string
          format: uuid
    responses:
      "204":
        description: Client deleted successfully
      "400":
        description: Invalid client ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "403":
        description: Client does not belong to this user
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Client not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
