# ─── Health Endpoints ────────────────────────────────────────
# /health lives at the root (no /v1 prefix), so it needs its own server.
servers:
  - url: "{protocol}://{host}"
    description: Root server (no version prefix)
    variables:
      protocol:
        default: http
        enum: [http, https]
      host:
        default: localhost:8080
get:
  summary: Health check
  operationId: healthCheck
  tags:
    - Health
  responses:
    "200":
      description: Service is healthy
      content:
        application/json:
          schema:
            $ref: "../schemas/health.yaml#/HealthResponse"
          example:
            status: "healthy"
            uptime: "2h35m10s"
            database: "connected"
            contract_version: "1.0.0"
    "404":
      description: Endpoint not found
      content:
        application/json:
          schema:
            $ref: "../schemas/error.yaml#/ErrorResponse"
          example:
            error: "endpoint not found"
    "503":
      description: Service is unhealthy (database disconnected)
      content:
        application/json:
          schema:
            $ref: "../schemas/health.yaml#/HealthResponseUnhealthy"
          example:
            status: "unhealthy"
            uptime: "2h35m10s"
            database: "disconnected"
            error: "connection refused"
            contract_version: "1.0.0"
