# ─── Piece Definition Endpoints ───────────────────────────────

# GET + POST /piece-definitions
collection:
  get:
    summary: List all piece definitions (predefined + user's custom)
    operationId: listPieceDefinitions
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        required: false
        description: Page number (1-based). Defaults to 1.
        schema:
          type: integer
          minimum: 1
          default: 1
          example: 1
      - name: page_size
        in: query
        required: false
        description: Number of items per page. Defaults to 20, max 100.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          example: 20
      - name: include_archived
        in: query
        required: false
        description: When true, include archived piece definitions in the results. Defaults to false.
        schema:
          type: boolean
          default: false
          example: false
    responses:
      "200":
        description: Paginated list of piece definitions
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PaginatedPieceDefinitionResponse"
      "400":
        description: Invalid pagination parameters (e.g. page < 1, page_size not in 1–100)
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "page_size must be between 1 and 100"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "authorization header required"

  post:
    summary: Create a new custom piece definition
    operationId: createPieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "../schemas/piece_definition.yaml#/CreatePieceDefinitionRequest"
          encoding:
            image:
              contentType: image/png, image/jpeg, image/webp
    responses:
      "201":
        description: Piece definition created successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PieceDefinitionResponse"
      "400":
        description: Invalid request body, unsupported image type, or image exceeds 5MB
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "unsupported image format"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "authorization header required"

# GET/PUT/DELETE /piece-definitions/{piece_definition_id}
item:
  get:
    summary: Get a piece definition by ID
    operationId: getPieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: piece_definition_id
        in: path
        required: true
        description: The piece definition's UUID
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Piece definition found
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PieceDefinitionResponse"
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "invalid piece definition ID format"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "authorization header required"
      "404":
        description: Piece definition not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "piece definition not found"

  put:
    summary: Update a custom piece definition
    operationId: updatePieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: piece_definition_id
        in: path
        required: true
        description: The piece definition's UUID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "../schemas/piece_definition.yaml#/UpdatePieceDefinitionRequest"
          encoding:
            image:
              contentType: image/png, image/jpeg, image/webp
    responses:
      "200":
        description: Piece definition updated successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PieceDefinitionResponse"
      "400":
        description: Invalid request body, ID format, unsupported image type, or image exceeds 5MB
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "unsupported image format"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "authorization header required"
      "403":
        description: Cannot modify predefined piece definition
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "cannot modify predefined piece definition"
      "404":
        description: Piece definition not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "piece definition not found"
      "409":
        description: Piece definition is in use by existing pieces
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "piece definition is in use by existing pieces"

  delete:
    summary: Delete a custom piece definition
    operationId: deletePieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: piece_definition_id
        in: path
        required: true
        description: The piece definition's UUID
        schema:
          type: string
          format: uuid
    responses:
      "204":
        description: Piece definition deleted successfully
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "invalid piece definition ID format"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "authorization header required"
      "403":
        description: Cannot delete predefined piece definition
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "cannot delete predefined piece definition"
      "404":
        description: Piece definition not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "piece definition not found"
      "409":
        description: Piece definition is in use by existing pieces
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "piece definition is in use by existing pieces"

# POST /piece-definitions/{piece_definition_id}/archive
archive:
  post:
    summary: Archive a custom piece definition
    description: |
      Soft-disables a piece definition so it cannot be used to create new pieces,
      but existing pieces that reference it remain unaffected.
      Idempotent: archiving an already-archived definition returns 200 without changes.
    operationId: archivePieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: piece_definition_id
        in: path
        required: true
        description: The piece definition's UUID
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Piece definition archived successfully (or was already archived)
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PieceDefinitionResponse"
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "invalid piece definition ID format"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "authorization header required"
      "403":
        description: Cannot archive predefined piece definition
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "predefined piece definitions cannot be modified"
      "404":
        description: Piece definition not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "piece definition not found"

# POST /piece-definitions/{piece_definition_id}/unarchive
unarchive:
  post:
    summary: Unarchive a custom piece definition
    description: |
      Re-enables an archived piece definition so it can be used to create new pieces again.
      Idempotent: unarchiving an already-active definition returns 200 without changes.
    operationId: unarchivePieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: piece_definition_id
        in: path
        required: true
        description: The piece definition's UUID
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Piece definition unarchived successfully (or was already active)
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PieceDefinitionResponse"
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "invalid piece definition ID format"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "authorization header required"
      "403":
        description: Cannot unarchive predefined piece definition
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "predefined piece definitions cannot be modified"
      "404":
        description: Piece definition not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
            example:
              error: "piece definition not found"
