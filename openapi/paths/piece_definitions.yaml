# ─── Piece Definition Endpoints ───────────────────────────────

# POST + GET /users/me/piece-definitions
collection:
  post:
    summary: Create a new custom piece definition
    operationId: createPieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/piece_definition.yaml#/CreatePieceDefinitionRequest"
          example:
            name: "Custom L-Shape"
            image_url: ""
            dimension_schema:
              - key: "a"
                label: "Length"
                unit: "mm"
              - key: "b"
                label: "Width"
                unit: "mm"
    responses:
      "201":
        description: Piece definition created successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PieceDefinitionResponse"
      "400":
        description: Invalid request body
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  get:
    summary: List all piece definitions (predefined + user's custom)
    operationId: listPieceDefinitions
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        required: false
        description: Page number (1-based). Defaults to 1.
        schema:
          type: integer
          minimum: 1
          default: 1
          example: 1
      - name: page_size
        in: query
        required: false
        description: Number of items per page. Defaults to 20, max 100.
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          example: 20
    responses:
      "200":
        description: Paginated list of piece definitions
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PaginatedPieceDefinitionResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

# GET/PUT/DELETE /users/me/piece-definitions/{piece_definition_id}
item:
  get:
    summary: Get a piece definition by ID
    operationId: getPieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: piece_definition_id
        in: path
        required: true
        description: The piece definition's UUID
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Piece definition found
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PieceDefinitionResponse"
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Piece definition not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  put:
    summary: Update a custom piece definition
    operationId: updatePieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: piece_definition_id
        in: path
        required: true
        description: The piece definition's UUID
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/piece_definition.yaml#/UpdatePieceDefinitionRequest"
          example:
            name: "Custom L-Shape (revised)"
    responses:
      "200":
        description: Piece definition updated successfully
        content:
          application/json:
            schema:
              $ref: "../schemas/piece_definition.yaml#/PieceDefinitionResponse"
      "400":
        description: Invalid request body or ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "403":
        description: Cannot modify predefined piece definition
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Piece definition not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"

  delete:
    summary: Delete a custom piece definition
    operationId: deletePieceDefinition
    tags:
      - Piece Definitions
    security:
      - bearerAuth: []
    parameters:
      - name: piece_definition_id
        in: path
        required: true
        description: The piece definition's UUID
        schema:
          type: string
          format: uuid
    responses:
      "204":
        description: Piece definition deleted successfully
      "400":
        description: Invalid ID format
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "401":
        description: Missing or invalid token
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "403":
        description: Cannot delete predefined piece definition
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
      "404":
        description: Piece definition not found
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ErrorResponse"
